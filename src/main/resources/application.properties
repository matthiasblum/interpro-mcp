spring.application.name=interpro-mcp
server.port=8082

# --- MCP server (Streamable HTTP, stateless) ---
spring.ai.mcp.server.name=interpro-mcp
spring.ai.mcp.server.version=0.1.0
spring.ai.mcp.server.protocol=STATELESS

# --- CORS (browser clients: MCP Inspector, web front-ends) ---
# Origin patterns allowed to call /mcp from a browser; empty = browser CORS disabled.
# Disabled by default: the deployed dev/prod instances serve non-browser MCP clients,
# which send no Origin header and are unaffected. For LOCAL browser testing, 
# e.g. MCP Inspector,  activate the `local` profile (application-local.properties), which
# allows localhost origins. The MCP spec requires validating Origin (DNS-rebinding
# defence), so do not use "*"; add specific origins instead
mcp.cors.allowed-origins=

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
# Serve the management endpoints under /mcp so the whole app lives beneath one public
# path (/interpro/mcp). Health is then at /mcp/actuator/health. 
# NB: base-path /mcp on its own would collide with the MCP
# endpoint, so it must be /mcp/actuator.
management.endpoints.web.base-path=/mcp/actuator

# --- Backend service base URLs ---
interpro.api.base-url=https://wwwdev.ebi.ac.uk/interpro/api
interpro.matches.base-url=https://wwwdev.ebi.ac.uk/interpro/matches/api
ebisearch.base-url=https://wwwdev.ebi.ac.uk/ebisearch/ws/rest
interproscan.base-url=https://wwwdev.ebi.ac.uk/Tools/services/rest/iprscan6

# --- InterProScan 6 (EMBL-EBI Job Dispatcher) ---
interproscan.email=interpro-mcp-dev@ebi.ac.uk
# analyzeSequence submits and waits up to this long for the job to finish before
# returning a jobId for later retrieval via getSequenceAnalysis.
interproscan.poll.max-wait-seconds=60
interproscan.poll.interval-seconds=5
