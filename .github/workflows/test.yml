name: Tests (contract)

# Runs the no-LLM contract layer only. The agentic layer needs the Claude CLI
# (and an authenticated account), so it is left to run locally
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - "eval/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - "eval/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build the server jar
        run: mvn -q -B -DskipTests package

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r eval/requirements.txt

      - name: Start the server
        run: |
          JAR=$(ls target/interpro-mcp-*.jar | grep -v '\.original$' | head -n1)
          echo "Starting $JAR"
          nohup java -jar "$JAR" \
            --spring.profiles.active=prod \
            --interpro.api.base-url=https://www.ebi.ac.uk/interpro/wwwapi \
            > server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for the health endpoint before running the tests.
          for _ in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:8082/mcp/actuator/health; then
              echo "server is healthy"; exit 0
            fi
            sleep 2
          done
          echo "error: server did not become healthy in time"; cat server.log; exit 1

      - name: Contract tests (no LLM)
        # Runs against the server started above; the tools query live EMBL-EBI
        # services, so the runner needs outbound HTTPS.
        run: pytest eval -m contract

      - name: Stop the server
        if: always()
        run: '[ -n "$SERVER_PID" ] && kill "$SERVER_PID" || true'

      - name: Server log
        if: failure()
        run: cat server.log || true
