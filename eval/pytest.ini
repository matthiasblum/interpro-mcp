[pytest]
# Test suite for the InterPro MCP server. Two layers, selected by marker:
#   pytest -m contract   # no LLM: what CI runs
#   pytest -m agentic    # drives the Claude CLI (needs `claude`)
#   pytest               # both
testpaths = .
addopts = -ra -v
markers =
    contract: deterministic JSON-RPC checks against the tools (no LLM)
    agentic: end-to-end checks driving the server via the Claude CLI (needs `claude`)
