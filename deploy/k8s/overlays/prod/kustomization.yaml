apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: interpro-mcp-prod

resources:
  - ../../base
  - ingress.yaml

patches:
  - path: configmap-patch.yaml
  - target:
      kind: Deployment
      name: interpro-mcp
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

images:
  # The deploy job overwrites this via `kustomize edit set image`.
  - name: interpro-mcp
    newName: interpro-mcp
    newTag: latest
