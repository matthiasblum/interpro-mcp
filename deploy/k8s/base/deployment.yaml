apiVersion: apps/v1
kind: Deployment
metadata:
  name: interpro-mcp
  labels:
    app: interpro-mcp
# No namespace here: each overlay (dev/prod) sets it via the kustomize
# `namespace:` transformer. The image is a bare name that the deploy job pins to a
# concrete tag with `kustomize edit set image interpro-mcp=<registry>/...:<sha>`.
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interpro-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # keep the service fully available during rollouts
      maxSurge: 1
  template:
    metadata:
      labels:
        app: interpro-mcp
    spec:
      # Spread the replicas across the three worker nodes for availability.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: interpro-mcp
      # Lets the cluster pull the image from the private GitLab registry.
      # The secret is created/refreshed by the deploy job (see .gitlab-ci.yml).
      imagePullSecrets:
        - name: gitlab-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: interpro-mcp
          image: interpro-mcp   # kustomize image key; pinned to a real tag at deploy time
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: interpro-mcp-config
          # Give the JVM time to start before liveness begins (startup probe),
          # then check the actuator health endpoint for readiness and liveness.
          startupProbe:
            httpGet:
              path: /mcp/actuator/health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /mcp/actuator/health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /mcp/actuator/health
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "4Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Root filesystem is read-only; the JVM/Tomcat still need a writable /tmp.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
